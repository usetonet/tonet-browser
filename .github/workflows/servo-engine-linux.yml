# Best-effort compile of Tonet with default features (includes `servo-engine`) on Ubuntu.
# `ServoViewportRuntime::tick` remains a no-op on non-Windows until a native surface lands;
# this job tracks whether the `servo` crate still links on Linux over time (see checklist § Linux / macOS Servo embed).
# Uses `continue-on-error: true` so CI on main is not blocked by toolchain / sysdep drift.
name: Servo engine (Linux)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/tonet/**"
      - ".github/workflows/servo-engine-linux.yml"
      - "docs/SERVO_INTEGRATION_CHECKLIST.md"

jobs:
  check-tonet-servo-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (minimal)
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: cargo check (tonet, default features)
        run: cargo check -p tonet
