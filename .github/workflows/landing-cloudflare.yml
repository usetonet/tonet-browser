# Construye la landing y la despliega en Cloudflare Workers (directorio web/landing).
name: Deploy landing (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "web/landing/**"
      - "crates/tonet/Cargo.toml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web/landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/landing/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build estático
        env:
          TONET_CDN_BASE_URL: ${{ vars.TONET_CDN_BASE_URL }}
          TONET_CDN_VERSION_PATH: ${{ vars.TONET_CDN_VERSION_PATH }}
          TONET_SITE_DOWNLOADS_PAGE: ${{ vars.TONET_SITE_DOWNLOADS_PAGE }}
          TONET_RELEASE_PRODUCTION: ${{ vars.TONET_RELEASE_PRODUCTION || 'true' }}
        run: npm run build

      # Añade en GitHub → Settings → Secrets: CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID
      - name: Desplegar con Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/landing
          command: deploy
