# Creates a GitHub Release (tag vX.Y.Z + MSI, EXE, .deb) only when crates/tonet
# version is strictly greater than on main's first parent — not on every push.
name: Release on version bump

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tonet-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  TONET_UPDATE_MANIFEST_URL: ${{ vars.TONET_UPDATE_MANIFEST_URL }}
  TONET_DOWNLOADS_PAGE_URL: ${{ vars.TONET_DOWNLOADS_PAGE_URL }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.compare.outputs.should_release }}
      version: ${{ steps.compare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide if crate version increased
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "No parent commit — skip (initial history)."
            exit 0
          fi

          NEW=$(grep -m1 '^version[[:space:]]*=' crates/tonet/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          if ! OLD_CONTENT=$(git show HEAD^1:crates/tonet/Cargo.toml 2>/dev/null); then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No crates/tonet/Cargo.toml on first parent — skip."
            exit 0
          fi
          OLD=$(echo "$OLD_CONTENT" | grep -m1 '^version[[:space:]]*=' | sed -E 's/.*"([^"]+)".*/\1/' || true)
          if [[ -z "$OLD" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Could not read previous version — skip."
            exit 0
          fi

          if [[ "$OLD" == "$NEW" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($NEW)."
            exit 0
          fi

          # Strict increase (sort -V: 0.2.0 > 0.1.0; pre-releases sort after releases in GNU sort -V)
          HIGHER=$(printf '%s\n' "$OLD" "$NEW" | sort -V | tail -1)
          if [[ "$HIGHER" != "$NEW" || "$OLD" == "$NEW" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Version did not strictly increase ($OLD -> $NEW)."
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/v$NEW" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$NEW already exists — skip."
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Will release $NEW (previous $OLD)."

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tonet

      - name: Crate version
        id: crate
        shell: bash
        env:
          WANT: ${{ needs.check-version.outputs.version }}
        run: |
          v=$(python -c "import json,subprocess; d=json.loads(subprocess.check_output(['cargo','metadata','--no-deps','--format-version','1'])); print(next(p['version'] for p in d['packages'] if p['name']=='tonet'))")
          if [[ "$v" != "$WANT" ]]; then echo "Cargo.toml version $v != expected $WANT"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install WiX Toolset 3.14
        shell: pwsh
        run: |
          $dest = Join-Path $env:RUNNER_TEMP "wix314"
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile wix.zip
          Expand-Archive wix.zip -DestinationPath $dest
          "$dest" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          $v = "${{ steps.crate.outputs.version }}"
          $dist = Join-Path (Get-Location) "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $src = Join-Path (Get-Location) "target\release"
          candle.exe -nologo -arch x64 "-dProductVersion=$v" "-dSourceDir=$src" -out "$($dist)\" -ext WixUIExtension "wix\Main.wxs"
          $msi = Join-Path $dist "Tonet-$v-x64.msi"
          light.exe -nologo -out $msi -ext WixUIExtension -cultures:en-us (Join-Path $dist "Main.wixobj")

      - run: choco install innosetup -y

      - name: Sync version in tonet.iss
        shell: pwsh
        run: |
          $v = "${{ steps.crate.outputs.version }}"
          (Get-Content "installer\tonet.iss") | ForEach-Object {
            if ($_ -match '^\#define MyAppVersion ') { '#define MyAppVersion "' + $v + '"' } else { $_ }
          } | Set-Content "installer\tonet.iss" -Encoding utf8

      - name: Build EXE (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          & $iscc (Join-Path (Get-Location) "installer\tonet.iss")

      - name: Portable zip + web installer (TonetSetup)
        shell: pwsh
        run: |
          $v = "${{ steps.crate.outputs.version }}"
          $dist = Join-Path (Get-Location) "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Compress-Archive -Path "target\release\tonet.exe" -DestinationPath "$dist\Tonet-$v-windows-x64-portable.zip" -Force
          cargo build --release -p tonet-setup
          Copy-Item "target\release\TonetSetup.exe" "$dist\TonetSetup-x64.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-${{ needs.check-version.outputs.version }}
          path: dist/*

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Desktop dependencies (eframe / GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libspeechd-dev patchelf

      - name: Build release binary
        run: cargo build --release -p tonet

      - name: Verify version matches
        shell: bash
        run: |
          v=$(grep -m1 '^version' crates/tonet/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          test "$v" = "${{ needs.check-version.outputs.version }}"

      - name: Build .deb
        run: |
          chmod +x packaging/debian/build-deb.sh
          ./packaging/debian/build-deb.sh

      - name: Web installer (TonetSetup) for Linux
        run: |
          cargo build --release -p tonet-setup
          mkdir -p dist
          cp "target/release/TonetSetup" "dist/TonetSetup-x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ needs.check-version.outputs.version }}
          path: dist/*

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tonet

      - name: Verify version matches
        shell: bash
        run: |
          v=$(grep -m1 '^version' crates/tonet/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          test "$v" = "${{ needs.check-version.outputs.version }}"

      - name: Package macOS tarball + web installer
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.check-version.outputs.version }}"
          mkdir -p dist
          tar -czf "dist/Tonet-${v}-macos.tar.gz" -C target/release tonet
          cargo build --release -p tonet-setup
          cp "target/release/TonetSetup" "dist/TonetSetup-macos"

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ needs.check-version.outputs.version }}
          path: dist/*

  publish:
    needs: [check-version, build-windows, build-linux, build-macos]
    if: >-
      always() &&
      needs.check-version.outputs.should_release == 'true' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: release-windows-${{ needs.check-version.outputs.version }}
          path: assets

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux-${{ needs.check-version.outputs.version }}
          path: assets

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ needs.check-version.outputs.version }}
          path: assets

      - name: List assets
        run: ls -la assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Tonet ${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            assets/*

  publish-cdn:
    needs: [check-version, build-windows, build-linux, build-macos]
    if: >-
      always() &&
      needs.check-version.outputs.should_release == 'true' &&
      needs.build-windows.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-macos.result == 'success' &&
      vars.CLOUDFLARE_R2_BUCKET != ''
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_BUCKET: ${{ vars.CLOUDFLARE_R2_BUCKET }}
      CDN_BASE: ${{ vars.TONET_CDN_BASE_URL }}
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: release-windows-${{ needs.check-version.outputs.version }}
          path: assets

      - name: Download Linux assets
        uses: actions/download-artifact@v4
        with:
          name: release-linux-${{ needs.check-version.outputs.version }}
          path: assets

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          name: release-macos-${{ needs.check-version.outputs.version }}
          path: assets

      - name: Setup Node for Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm i -g wrangler@3

      - name: Upload release assets to R2
        shell: bash
        run: |
          set -euo pipefail
          for f in assets/*; do
            name="$(basename "$f")"
            wrangler r2 object put "${R2_BUCKET}/${name}" --file "$f"
          done

      - name: Generate and upload CDN version manifest
        shell: bash
        run: |
          set -euo pipefail
          base="${CDN_BASE%/}"
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "releasesUrl": "${base}/",
            "cdnBaseUrl": "${base}",
            "updateManifestUrl": "${base}/version.json",
            "download": {
              "windowsSetup": "${base}/Tonet-Setup-${VERSION}-x64.exe",
              "linuxSetup": "${base}/tonet_${VERSION}_amd64.deb",
              "macSetup": "${base}/Tonet-${VERSION}-macos.tar.gz",
              "windowsMsi": "${base}/Tonet-${VERSION}-x64.msi",
              "windowsExe": "${base}/Tonet-Setup-${VERSION}-x64.exe",
              "windowsPortableZip": "${base}/Tonet-${VERSION}-windows-x64-portable.zip",
              "deb": "${base}/tonet_${VERSION}_amd64.deb",
              "macTarball": "${base}/Tonet-${VERSION}-macos.tar.gz"
            }
          }
          EOF
          wrangler r2 object put "${R2_BUCKET}/version.json" --file version.json
